<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Portfolio Form</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;padding:30px}
.form-box{max-width:500px;margin:auto;background:#fff;padding:25px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.1)}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:5px}
button{background:#2563eb;color:#fff;border:none;padding:12px 20px;border-radius:5px;cursor:pointer}
</style>
</head>
<body>
<div class="form-box">
<h2>Contact Me</h2>
<form>
<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Phone</label>
<input type="tel" placeholder="Enter your phone number">

<label>Message</label>
<textarea rows="5" placeholder="Write your message"></textarea>

<button type="submit">Submit</button>
</form>
</div>
</body>
</html>
